name: Optimize Images

# Läuft, wenn Bilder nach img/ gepusht werden. Verarbeitet NUR die im Push
# geänderten Bilder: PNG/JPG werden in optimiertes WebP (max. 800 px) umgewandelt
# und das Original entfernt; vorhandene WebP werden in place optimiert.
on:
  push:
    paths:
      - 'img/**.png'
      - 'img/**.jpg'
      - 'img/**.jpeg'
      - 'img/**.webp'

permissions:
  contents: write

jobs:
  optimize:
    # Verhindert eine Endlosschleife: der eigene Rück-Commit triggert nicht erneut.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie für den Diff gegen den Vorzustand

      - name: Geänderte Bilder ermitteln
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(ls img/*.png img/*.jpg img/*.jpeg img/*.webp 2>/dev/null || true)
          else
            FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'img/*.png' 'img/*.jpg' 'img/*.jpeg' 'img/*.webp' || true)
          fi
          OUT=""
          for f in $FILES; do
            case "$f" in img/icon-*) continue ;; esac   # App-Icons (PNG) nicht anfassen
            [ -f "$f" ] && OUT="$OUT $f"
          done
          echo "files=$OUT" >> "$GITHUB_OUTPUT"
          echo "Zu verarbeiten:$OUT"

      - name: Tools installieren
        if: steps.changed.outputs.files != ''
        run: sudo apt-get -qq update && sudo apt-get -qq install -y imagemagick webp

      - name: Nach WebP konvertieren / optimieren
        if: steps.changed.outputs.files != ''
        run: |
          for f in ${{ steps.changed.outputs.files }}; do
            case "$f" in
              *.webp)
                convert "$f" -resize '800x800>' -strip -quality 82 "$f" ;;
              *)
                convert "$f" -resize '800x800>' -strip -quality 82 "${f%.*}.webp"
                rm -f "$f" ;;   # Original-Raster entfernen, App nutzt WebP
            esac
          done

      - name: Zurück-Commit (nur bei Änderungen)
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A img
          if ! git diff --cached --quiet; then
            git commit -m "Optimize images (to WebP, <=800px)"
            git push
          else
            echo "Keine Änderungen."
          fi

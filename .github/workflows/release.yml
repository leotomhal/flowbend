name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Versions-Tag, z. B. v1.0.0'
        required: true
        default: v1.0.0

permissions:
  contents: write   # nötig, damit action-gh-release Tag/Release/Asset schreiben darf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deploy package
        run: |
          # Nur die lauffähigen Dateien ins ZIP – keine Doku, kein .github,
          # kein Deploy-Script, keine Lizenz. So bleibt das Update schlank
          # und update-check.php überschreibt sich beim Deploy nicht selbst.
          VER="${{ github.event.inputs.version || github.ref_name }}"
          VER="${VER#v}"   # führendes v entfernen
          mkdir -p dist
          cp -r index.html app.js manifest.json sw.js data vendor img dist/
          # App-Version + SW-Cache auf den Release-Tag stempeln (neuer SW pro Release
          # -> Update-Hinweis greift; angezeigte Version stimmt immer).
          sed -i "s/const APP_VERSION = \"[^\"]*\"/const APP_VERSION = \"$VER\"/" dist/app.js
          sed -i "s/const CACHE = \"[^\"]*\"/const CACHE = \"flowbend-$VER\"/" dist/sw.js
          cd dist && zip -r ../flowbend.zip .

      - uses: softprops/action-gh-release@v2
        with:
          # Bei manuellem Start (workflow_dispatch) legt die Action den Tag
          # serverseitig an; bei Tag-Push wird der gepushte Tag verwendet.
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: flowbend ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: flowbend.zip
          body: |
            Deploy-Paket **flowbend.zip** – nur die lauffähigen Dateien
            (index.html, app.js, manifest.json, sw.js, data/, vendor/, img/).
            Wird vom Auto-Updater (`deploy/update-check-*.php`) automatisch
            in den Webroot entpackt.
